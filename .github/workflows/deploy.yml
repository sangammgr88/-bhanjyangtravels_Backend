name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.SERVER_HOST}}
          username: ${{secrets.SERVER_USERNAME}}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd  /home/ubuntu/clients/bhanjyang-travel/backend
            git pull origin main  # Pull latest changes
            npm install --legacy-peer-deps # Install dependencies (if needed)
             npx prisma db push
             npx prisma generate 
            npm run build  # Build project (if applicable)
            pm2 restart api.bhanjyangtravels  # Restart the app if using PM2
